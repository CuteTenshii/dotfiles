<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Apple Color Emoji as the emoji generic family -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Apple Color Emoji</family>
    </prefer>
  </alias>

  <!-- Prepend Apple Color Emoji to generic families for emoji fallback -->
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Apple Color Emoji</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Apple Color Emoji</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Apple Color Emoji</string>
    </edit>
  </match>

  <!-- Strip emoji codepoints from DejaVu Sans -->
  <match target="scan">
    <test name="family" qual="any"><string>DejaVu Sans</string></test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <range><int>0x2600</int><int>0x26FF</int></range>
          <range><int>0x2700</int><int>0x27BF</int></range>
          <range><int>0x1F300</int><int>0x1F5FF</int></range>
          <range><int>0x1F600</int><int>0x1F64F</int></range>
          <range><int>0x1F680</int><int>0x1F6FF</int></range>
          <range><int>0x1F900</int><int>0x1F9FF</int></range>
        </charset>
      </minus>
    </edit>
  </match>

  <!-- Strip emoji codepoints from Font Awesome (icon font, not emoji) -->
  <match target="scan">
    <test name="family" qual="any"><string>Font Awesome 7 Free</string></test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset>
          <range><int>0x2600</int><int>0x26FF</int></range>
          <range><int>0x2700</int><int>0x27BF</int></range>
          <range><int>0x1F300</int><int>0x1F5FF</int></range>
          <range><int>0x1F600</int><int>0x1F64F</int></range>
          <range><int>0x1F680</int><int>0x1F6FF</int></range>
          <range><int>0x1F900</int><int>0x1F9FF</int></range>
        </charset>
      </minus>
    </edit>
  </match>

  <alias>
    <family>-apple-system</family>
    <prefer>
      <family>SF Pro</family>
      <family>Inter</family>
      <family>Roboto</family>
      <family>Ubuntu</family>
      <family>DejaVu Sans</family>
      <family>sans-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>BlinkMacSystemFont</family>
    <prefer>
      <family>SF Pro</family>
      <family>Inter</family>
      <family>sans-serif</family>
    </prefer>
  </alias>
</fontconfig>
